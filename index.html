<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التسجيل</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Tajawal';
background:linear-gradient(135deg,#0f766e,#022c22);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:100%;
max-width:400px;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 25px 50px rgba(0,0,0,.3);
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.logo img{
width:90px;
display:block;
margin:auto;
margin-bottom:10px;
}

h2{
text-align:center;
margin-bottom:10px;
color:#064e3b;
}

.note{
text-align:center;
font-size:13px;
color:#555;
margin-bottom:15px;
}

.label{
margin-top:12px;
font-weight:600;
}

input,select{
width:90%;
padding:14px;
margin-top:6px;
border-radius:12px;
border:1px solid #ddd;
transition:.2s;
}

input:focus,select:focus{
border-color:#0f766e;
outline:none;
box-shadow:0 0 0 2px #99f6e4;
}

button{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#0f766e;
color:white;
font-size:16px;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#115e59;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png">
</div>

<h2>📖 التسجيل في دورة التجويد</h2>

<div class="note">
املأ البيانات وسيتم التواصل معك قريباً
</div>

<div class="label">الاسم *</div>
<input id="name">

<div class="label">العمر *</div>
<input id="age">

<div class="label">رقم الهاتف *</div>
<input id="phone">

<div class="label">الجنس</div>
<select id="gender">
<option>ذكر</option>
<option>أنثى</option>
</select>

<div class="label">
🤍 اجعل لك نصيباً في هذا العلم
<div style="font-size:13px;color:#555;margin-top:4px;">
بمساهمة تناسبك وتنفع غيرك
</div>
</div>

<input type="number" id="price" placeholder="اكتب المبلغ الذي تريد">

<button onclick="send()">📩 إرسال الطلب</button>

</div>

<script>

function send(){

let name=document.getElementById("name").value.trim();
let age=document.getElementById("age").value.trim();
let phone=document.getElementById("phone").value.trim();
let gender=document.getElementById("gender").value;
let price=document.getElementById("price").value;

if(!name){alert("يرجى إدخال الاسم");return;}
if(!age){alert("يرجى إدخال العمر");return;}
if(!phone){alert("يرجى إدخال رقم الهاتف");return;}

let iframe = document.getElementById("hiddenFrame");
if(!iframe){
  iframe = document.createElement("iframe");
  iframe.name = "hiddenFrame";
  iframe.style.display = "none";
  document.body.appendChild(iframe);
}

let form = document.createElement("form");
form.method = "POST";
form.target = "hiddenFrame";
form.action = "https://script.google.com/macros/s/AKfycbyHfXsjZiLWaNiaorFGsYPslyttw1q9G5mWmjZ-agtE5vz5hGvGrukuHs_3-AyUqLI6/exec";

let fields = {
  name,
  age,
  phone,
  gender,
  subject: "تجويد",
  price
};

for (let key in fields){
  let input = document.createElement("input");
  input.type = "hidden";
  input.name = key;
  input.value = fields[key];
  form.appendChild(input);
}

document.body.appendChild(form);
form.submit();

setTimeout(()=>{ form.remove(); }, 500);

document.querySelector(".container").innerHTML = `
<div style="text-align:center; padding:30px;">
<h2 style="color:#0f766e;">✅ تم التسجيل</h2>
<p>سيتم التواصل معك قريباً 🤍</p>
</div>
`;

}

</script>

</body>
</html>
