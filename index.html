<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التسجيل</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Tajawal';
background:linear-gradient(135deg,#0f766e,#022c22);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:100%;
max-width:400px;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 25px 50px rgba(0,0,0,.3);
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.logo img{

width:140px;
display:block;
margin:auto;
margin-bottom:10px;
}

h2{
text-align:center;
margin-bottom:10px;
color:#064e3b;
}

.note{
text-align:center;
font-size:13px;
color:#555;
margin-bottom:15px;
}

.label{
margin-top:12px;
font-weight:600;
}

input,select{
width:90%;
padding:14px;
margin-top:6px;
border-radius:12px;
border:1px solid #ddd;
transition:.2s;
}

input:focus,select:focus{
border-color:#0f766e;
outline:none;
box-shadow:0 0 0 2px #99f6e4;
}

.error{
color:red;
font-size:12px;
display:none;
margin-top:4px;
}

button{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#0f766e;
color:white;
font-size:16px;
cursor:pointer;
transition:.2s;
}

button:disabled{
background:#94a3b8;
cursor:not-allowed;
}

button:hover:not(:disabled){
background:#115e59;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png">
</div>

<h2>📖 التسجيل في دورة التجويد</h2>

<div class="note">
املأ البيانات وسيتم التواصل معك قريباً
</div>

<div class="label">الاسم *</div>
<input id="name" required>
<div class="error" id="nameError">هذا الحقل مطلوب</div>

<div class="label">العمر *</div>
<input id="age" type="number" required>
<div class="error" id="ageError">أدخل عمر صحيح</div>

<div class="label">رقم الهاتف *</div>
<input id="phone" required>
<div class="error" id="phoneError">أدخل رقم هاتف صحيح</div>

<div class="label">الجنس *</div>
<select id="gender" required>
<option value="">اختر</option>
<option>ذكر</option>
<option>أنثى</option>
</select>
<div class="error" id="genderError">هذا الحقل مطلوب</div>

<div class="label">
💰 رسوم الاشتراك المعتادة تقارب 29$ شهرياً
<div style="font-size:13px;color:#555;margin-top:4px;">
اختر قيمة الاشتراك التي تناسبك
</div>
</div>

<input type="number" id="price" placeholder="اكتب المبلغ الذي تريد" required>
<div class="error" id="priceError">أدخل مبلغ صحيح</div>

<button id="submitBtn" onclick="send()" disabled>📩 التسجيل</button>

</div>

<script>

let inputs = document.querySelectorAll("input, select");
let button = document.getElementById("submitBtn");

inputs.forEach(el=>{
el.addEventListener("input", validateForm);
});

function validateForm(){

let name = document.getElementById("name").value.trim();
let age = document.getElementById("age").value;
let phone = document.getElementById("phone").value.trim();
let gender = document.getElementById("gender").value;
let price = document.getElementById("price").value;

let valid = true;

// name
if(!name){
showError("nameError");
valid = false;
}else hideError("nameError");

// age
if(!age || age <= 0){
showError("ageError");
valid = false;
}else hideError("ageError");

// phone
if(!phone || phone.length < 8){
showError("phoneError");
valid = false;
}else hideError("phoneError");

// gender
if(!gender){
showError("genderError");
valid = false;
}else hideError("genderError");

// price
if(!price || price <= 0){
showError("priceError");
valid = false;
}else hideError("priceError");

button.disabled = !valid;

}

function showError(id){
document.getElementById(id).style.display = "block";
}

function hideError(id){
document.getElementById(id).style.display = "none";
}

function send(){

validateForm();
if(button.disabled) return;

let name=document.getElementById("name").value.trim();
let age=document.getElementById("age").value.trim();
let phone=document.getElementById("phone").value.trim();
let gender=document.getElementById("gender").value;
let price=document.getElementById("price").value;

let iframe = document.getElementById("hiddenFrame");
if(!iframe){
  iframe = document.createElement("iframe");
  iframe.name = "hiddenFrame";
  iframe.style.display = "none";
  document.body.appendChild(iframe);
}

let form = document.createElement("form");
form.method = "POST";
form.target = "hiddenFrame";
form.action = "https://script.google.com/macros/s/AKfycbyHfXsjZiLWaNiaorFGsYPslyttw1q9G5mWmjZ-agtE5vz5hGvGrukuHs_3-AyUqLI6/exec";

let fields = {
  name,
  age,
  phone,
  gender,
  subject: "تجويد",
  price
};

for (let key in fields){
  let input = document.createElement("input");
  input.type = "hidden";
  input.name = key;
  input.value = fields[key];
  form.appendChild(input);
}

document.body.appendChild(form);
form.submit();

setTimeout(()=>{ form.remove(); }, 500);

document.querySelector(".container").innerHTML = `
<div style="text-align:center; padding:30px;">
<h2 style="color:#0f766e;">✅ تم التسجيل</h2>
<p>سيتم التواصل معك قريباً 🤍</p>
</div>
`;

}

</script>

</body>
</html>
